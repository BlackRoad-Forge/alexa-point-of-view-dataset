# Cloudflare Tunnel config for routing Stripe webhooks to blackroad-pi gateway
# Place at: /home/pi/.cloudflared/config.yml on blackroad-pi (192.168.4.64)
#
# Run: cloudflared tunnel run blackroad-stripe

tunnel: blackroad-stripe
credentials-file: /home/pi/.cloudflared/credentials.json

ingress:
  # Stripe webhook endpoint
  - hostname: stripe.blackroad.io
    service: http://localhost:8080
    originRequest:
      noTLSVerify: false
      connectTimeout: 30s

  # Edge API
  - hostname: edge.blackroad.io
    service: http://localhost:8080
    originRequest:
      connectTimeout: 30s

  # Catch-all
  - service: http_status:404
