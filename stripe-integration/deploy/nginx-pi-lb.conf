# Nginx load balancer config for Pi cluster
# Install on blackroad-pi (gateway node) to distribute across workers
# Place at: /etc/nginx/sites-available/stripe-lb.conf

upstream stripe_workers {
    # Gateway handles requests + distributes to workers
    server 192.168.4.64:8080 weight=1;   # blackroad-pi (gateway)
    server 192.168.4.38:8081 weight=3;   # aria64 (high capacity)
    server 192.168.4.49:8082 weight=1;   # alice
    server 192.168.4.99:8083 weight=1;   # lucidia-alt
}

server {
    listen 80;
    server_name stripe.blackroad.io edge.blackroad.io;

    location /api/v1/webhooks/stripe {
        # Webhooks always go to gateway node only (signature verification)
        proxy_pass http://192.168.4.64:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ {
        # All other API calls are load-balanced
        proxy_pass http://stripe_workers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
