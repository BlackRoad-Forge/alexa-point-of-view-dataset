name: CI - Data Validation & Integrity

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Mondays at 06:00 UTC to catch data drift
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-data:
    name: Validate Dataset
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Validate dataset integrity
        run: python3 scripts/validate_data.py

      - name: Validate survey files
        run: python3 scripts/check_surveys.py

      - name: Verify file checksums
        run: |
          echo "Generating checksums for data files..."
          sha256sum data/*.tsv | tee checksums.txt
          echo ""
          echo "Data files verified."

  lint-surveys:
    name: Lint Survey HTML
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check HTML well-formedness
        run: |
          errors=0
          for f in surveys/*.html; do
            if ! python3 -c "
          import html.parser, sys
          class P(html.parser.HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.errors = 0
              def handle_starttag(self, tag, attrs): pass
              def handle_endtag(self, tag): pass
          p = P()
          with open('$f') as fh:
              p.feed(fh.read())
          "; then
              echo "FAIL: $f"
              errors=$((errors + 1))
            else
              echo "OK: $f"
            fi
          done
          exit $errors

  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check for secrets in repository
        run: |
          echo "Scanning for potential secrets..."
          PATTERNS='(password|secret|api_key|access_token|private_key)\s*[:=]'
          if grep -rIiE "$PATTERNS" --include="*.py" --include="*.js" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.env" . 2>/dev/null | grep -v node_modules | grep -v ".git/"; then
            echo "WARNING: Potential secrets found. Review above matches."
            exit 1
          else
            echo "No secrets detected."
          fi

      - name: Check for large files
        run: |
          echo "Checking for files larger than 10MB..."
          find . -type f -size +10M -not -path './.git/*' | while read -r f; do
            size=$(du -h "$f" | cut -f1)
            echo "LARGE FILE: $f ($size)"
          done
          echo "Large file check complete."
